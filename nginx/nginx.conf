events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    upstream nextjs_upstream {
        server nextjs:3000;
    }

    upstream strapi_upstream {
        server strapi:1337;
    }

    # ==========================================
    # HTTP → HTTPS redirect + ACME challenge
    # ==========================================
    server {
        listen 80;
        listen [::]:80;
        server_name anounitedworld.com www.anounitedworld.com admin.anounitedworld.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Default HTTP - отбиваем запросы по IP
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 444;
        }
    }

    # ==========================================
    # www → без www
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name www.anounitedworld.com;

        ssl_certificate     /etc/letsencrypt/live/anounitedworld.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/anounitedworld.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://anounitedworld.com$request_uri;
    }

    # ==========================================
    # Основной сайт
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name anounitedworld.com;

        ssl_certificate     /etc/letsencrypt/live/anounitedworld.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/anounitedworld.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 100M;

        # Картинки Strapi через тот же домен
        location /uploads/ {
            proxy_pass         http://strapi_upstream/uploads/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_cache_valid  200 7d;
            add_header         Cache-Control "public, max-age=604800, immutable";
        }

        # Всё остальное → Next.js
        location / {
            proxy_pass         http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # ==========================================
    # Strapi admin
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name admin.anounitedworld.com;

        ssl_certificate     /etc/letsencrypt/live/anounitedworld.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/anounitedworld.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 100M;

        location / {
            proxy_pass         http://strapi_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
