# PostgreSQL для Strapi (запуск: docker compose -f docker-compose.strapi.yml up -d)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi
    ports:
      - "5432:5432"
    volumes:
      - strapi_pgdata:/var/lib/postgresql/data

volumes:
  strapi_pgdata:
