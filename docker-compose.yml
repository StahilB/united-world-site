services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strapi}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  strapi:
    build: ./strapi
    ports:
      - "1337:1337"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-strapi}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      APP_KEYS: ${APP_KEYS:?set APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT:?set API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?set ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-changeme_transfer_salt}
      STRAPI_TOKEN: "3f59bd5f61009a22be9f8a0bd8a610ae336f90549a7ac052b883e95be0f2f5790e974b49ef5d48ac9a5822ccc0fd85fa1be924ac3d861ef3f52bfdd416c6fe02c1ec1a012369f39760d3ad10e5b0437fe3cf39fcbca56f265d61e8504922057491f08504e6d1c001f61bef7b644466679644cfb28479a354e89688a566f4a2b1"
    volumes:
      - strapi_uploads:/app/public/uploads

  nextjs:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://72.56.250.143:1337}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      STRAPI_URL: ${STRAPI_URL:-http://strapi:1337}
      STRAPI_TOKEN: ${STRAPI_TOKEN:-}
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://72.56.250.143:1337}

  telegram-bot:
    build: ./telegram-bot
    restart: on-failure:5
    depends_on:
      - strapi
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID:?set CHANNEL_ID}
      STRAPI_URL: ${STRAPI_URL:-http://strapi:1337}
      STRAPI_TOKEN: ${STRAPI_TOKEN:?set STRAPI_TOKEN}
      SITE_URL: ${SITE_URL:-http://72.56.250.143}
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - nextjs
      - strapi

volumes:
  postgres_data:
  strapi_uploads:
