services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strapi}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  strapi:
    build: ./strapi
    ports:
      - "1337:1337"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-strapi}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      APP_KEYS: ${APP_KEYS:?set APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT:?set API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?set ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-changeme_transfer_salt}
      STRAPI_TOKEN: ${STRAPI_TOKEN:?set STRAPI_TOKEN}
    volumes:
      - strapi_uploads:/app/public/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          'fetch("http://localhost:1337/api/articles?pagination%5BpageSize%5D=1").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  nextjs:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-http://localhost:1337}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://anounitedworld.com}
        NEXT_PUBLIC_YANDEX_VERIFICATION: ${NEXT_PUBLIC_YANDEX_VERIFICATION:-}
        NEXT_PUBLIC_GOOGLE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_VERIFICATION:-}
        NEXT_PUBLIC_MAILRU_VERIFICATION: ${NEXT_PUBLIC_MAILRU_VERIFICATION:-}
        NEXT_PUBLIC_YANDEX_METRICA_ID: ${NEXT_PUBLIC_YANDEX_METRICA_ID:-}
        NEXT_PUBLIC_YM_WEBVISOR: ${NEXT_PUBLIC_YM_WEBVISOR:-true}
    restart: unless-stopped
    depends_on:
      strapi:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      STRAPI_URL: ${STRAPI_URL:-http://strapi:1337}
      STRAPI_TOKEN: ${STRAPI_TOKEN:-}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
      MASCOT_PROVIDER: ${MASCOT_PROVIDER:-gigachat}
      #ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MASCOT_ANTHROPIC_MODEL: ${MASCOT_ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      #OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MASCOT_OPENAI_MODEL: ${MASCOT_OPENAI_MODEL:-gpt-5-mini}
      GIGACHAT_AUTHORIZATION_KEY: ${GIGACHAT_AUTHORIZATION_KEY:-}
      GIGACHAT_OAUTH_SCOPE: ${GIGACHAT_OAUTH_SCOPE:-GIGACHAT_API_PERS}
      MASCOT_STRAPI_TOKEN: ${MASCOT_STRAPI_TOKEN:-}
      GIGACHAT_ALLOW_INSECURE_SSL: ${GIGACHAT_ALLOW_INSECURE_SSL:-false}
      MASCOT_GIGACHAT_MODEL: ${MASCOT_GIGACHAT_MODEL:-GigaChat}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY:-}
      YANDEX_CLOUD_FOLDER_ID: ${YANDEX_CLOUD_FOLDER_ID:-}
      MASCOT_YANDEX_MODEL_URI: ${MASCOT_YANDEX_MODEL_URI:-}
      MASCOT_MAX_TOKENS: ${MASCOT_MAX_TOKENS:-500}
      MASCOT_RATE_LIMIT_PER_MIN: ${MASCOT_RATE_LIMIT_PER_MIN:-10}

  telegram-bot:
    build: ./telegram-bot
    restart: on-failure:5
    depends_on:
      strapi:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID:?set CHANNEL_ID}
      STRAPI_URL: ${STRAPI_URL:-http://strapi:1337}
      STRAPI_TOKEN: ${STRAPI_TOKEN:?set STRAPI_TOKEN}
      SITE_URL: ${SITE_URL:-http://85.239.42.204}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/wp-redirects.map:/etc/nginx/conf.d/wp-redirects.map:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - nextjs
      - strapi

volumes:
  postgres_data:
  strapi_uploads:
